<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AIoT Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{dark:'#0a0e17',panel:'#131722',border:'#1e2330',primary:'#2962ff',accent:'#089981'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', sans-serif; } body { background: #0a0e17; }</style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13l4-8 4 6 3-4 4 10H3z"/></svg>
                </div>
                <span class="text-2xl font-bold text-white">AIoT<span class="text-primary">Terminal</span></span>
            </a>
        </div>

        <div class="bg-panel border border-border rounded-2xl p-8">
            <h1 class="text-2xl font-bold text-white mb-2">Welcome back</h1>
            <p class="text-gray-400 text-sm mb-6">Sign in to your trading terminal</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for cat, msg in messages %}
                    <div class="mb-4 px-4 py-3 rounded-lg text-sm {{ 'bg-red-500/10 border border-red-500/30 text-red-400' if cat=='error' else 'bg-green-500/10 border border-green-500/30 text-green-400' }}">{{ msg }}</div>
                {% endfor %}
            {% endwith %}

            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1.5">Username</label>
                    <input name="username" type="text" placeholder="admin" required autocomplete="username"
                        class="w-full bg-dark border border-border rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-primary transition-colors text-sm">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1.5">Password</label>
                    <input name="password" type="password" placeholder="••••••••" required autocomplete="current-password"
                        class="w-full bg-dark border border-border rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-primary transition-colors text-sm">
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-blue-600 text-white font-semibold py-3 rounded-lg transition-all hover:shadow-lg hover:shadow-primary/30 text-sm">
                    Sign In →
                </button>
            </form>

            <p class="text-center text-gray-500 text-sm mt-6">
                No account? <a href="/register" class="text-primary hover:underline">Create one free</a>
            </p>
            <p class="text-center text-gray-600 text-xs mt-3">Default: admin / admin123</p>
        </div>
    </div>
</body>
</html>
