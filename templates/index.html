<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIoT Trading Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white font-inter h-screen overflow-hidden flex flex-col">

    <!-- Navbar -->
    <nav class="glass-panel mx-4 mt-4 p-4 rounded-xl flex justify-between items-center z-10 relative">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                AIoT Strategy Fatigue
            </h1>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search symbol (e.g. AAPL)" 
                    class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition-colors">
                <button onclick="searchStock()" class="absolute right-2 top-2 text-gray-400 hover:text-white">
                    🔍
                </button>
            </div>
            <div class="glass-panel px-4 py-2 rounded-lg border border-gray-700">
                <span class="text-sm text-gray-400">Balance:</span>
                <span id="virtualBalance" class="font-bold text-green-400 ml-2">₹100,000.00</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 p-4 flex gap-4 overflow-hidden">
        
        <!-- Left Sidebar: Watchlist -->
        <aside class="w-1/4 glass-panel rounded-xl p-4 flex flex-col overflow-hidden">
            <h2 class="text-lg font-semibold mb-4 text-gray-300 border-b border-gray-700 pb-2">Watchlist</h2>
            <div id="stockList" class="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-2">
                <!-- Stock Cards will be injected here -->
                <div class="text-center text-gray-500 mt-10">Loading data...</div>
            </div>
        </aside>

        <!-- Center: Chart & AI Insights -->
        <section class="flex-1 flex flex-col gap-4 overflow-hidden">
            <!-- Main Chart -->
            <div class="glass-panel rounded-xl p-4 flex-1 relative">
                <div class="flex justify-between items-center mb-2">
                    <h2 id="activeSymbol" class="text-xl font-bold">AAPL</h2>
                    <span id="activePrice" class="text-2xl font-light text-blue-400">0.00</span>
                </div>
                <div class="absolute inset-x-4 bottom-4 top-16">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
            
            <!-- AI Fatigue Indicator -->
            <div class="glass-panel rounded-xl p-4 h-48 flex items-center justify-between">
                <div class="w-1/3 text-center">
                    <h3 class="text-sm text-gray-400 mb-2 uppercase tracking-wide">Strategy Fatigue Score</h3>
                    <div class="relative w-32 h-32 mx-auto">
                        <canvas id="fatigueGauge"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center flex-col mt-4">
                            <span id="fatigueValue" class="text-3xl font-bold">0</span>
                        </div>
                    </div>
                </div>
                <div class="w-2/3 pl-6 border-l border-gray-700">
                    <h3 class="text-lg font-semibold mb-2">AI Analysis</h3>
                    <p id="aiExplanation" class="text-gray-300 text-sm leading-relaxed">
                        Initializing virtual sensors and AI models...
                    </p>
                    <div class="mt-4 flex items-center space-x-2">
                        <span class="text-sm text-gray-400">Recommendation:</span>
                        <span id="aiDecision" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-800 border border-gray-600">WAIT</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Sidebar: Trading & Portfolio -->
        <aside class="w-1/4 flex flex-col gap-4">
            <!-- Trade Panel -->
            <div class="glass-panel rounded-xl p-4">
                <h2 class="text-lg font-semibold mb-4 text-gray-300 border-b border-gray-700 pb-2">Trade Simulator</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Quantity</label>
                        <input type="number" id="tradeQty" value="1" min="1" class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="executeTrade('BUY')" class="flex-1 bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white font-bold py-2 rounded transition-all shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                            BUY
                        </button>
                        <button onclick="executeTrade('SELL')" class="flex-1 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold py-2 rounded transition-all shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                            SELL
                        </button>
                    </div>
                    <div id="tradeMessage" class="text-xs text-center h-4 text-green-400 transition-opacity opacity-0">Trade executed</div>
                </div>
            </div>

            <!-- Portfolio -->
            <div class="glass-panel rounded-xl p-4 flex-1 flex flex-col overflow-hidden">
                <h2 class="text-lg font-semibold mb-4 text-gray-300 border-b border-gray-700 pb-2">Holdings</h2>
                <div id="portfolioList" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-2">
                    <!-- Holdings injected here -->
                </div>
            </div>
        </aside>

    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
