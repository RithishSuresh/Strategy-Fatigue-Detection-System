<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — AIoT Terminal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(circle at 20% 50%,rgba(41,98,255,.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(124,58,237,.12) 0%,transparent 50%)}
.card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px}
input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;width:100%;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#2962ff}
input::placeholder{color:rgba(255,255,255,.3)}
.btn{width:100%;background:linear-gradient(135deg,#2962ff,#1a4fd8);border:none;border-radius:10px;padding:14px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(41,98,255,.4)}
</style>
</head>
<body>
<div class="card p-10 w-full max-w-md mx-4">
  <div class="text-center mb-8">
    <div class="w-12 h-12 bg-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h1 class="text-2xl font-bold text-white">Create Account</h1>
    <p class="text-gray-500 text-sm mt-1">Start with ₹1,00,000 virtual balance</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="mb-4 p-3 rounded-lg text-sm {% if cat=='error' %}bg-red-500/20 text-red-400 border border-red-500/30{% else %}bg-emerald-500/20 text-emerald-400 border border-emerald-500/30{% endif %}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST" class="space-y-4">
    <div>
      <label class="text-xs text-gray-400 mb-1 block uppercase tracking-wider">Username</label>
      <input type="text" name="username" placeholder="Choose a username" required autocomplete="username">
    </div>
    <div>
      <label class="text-xs text-gray-400 mb-1 block uppercase tracking-wider">Password</label>
      <input type="password" name="password" placeholder="Create a password" required autocomplete="new-password">
    </div>
    <button type="submit" class="btn mt-2">Create Account →</button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-6">
    Already have an account? <a href="/login" class="text-blue-400 hover:underline">Sign in</a>
  </p>
</div>
</body>
</html>
